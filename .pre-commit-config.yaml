# Pre-commit hooks for the COMP3011-CW2 search engine.
#
# Install once with `pre-commit install`. Subsequent commits will run:
#   1. ruff (lint + autofix; format)
#   2. mypy --strict on src/
#   3. the smoke-test subset of the pytest suite (fast — under 100 ms)
#
# The full pytest suite still runs in CI; this is the local fast loop.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2048"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy and pytest are run via the project venv at ./venv. This avoids
  # the pre-commit isolated-env problem of having to re-list every
  # transitive dependency (bs4, sentence-transformers, lightgbm, etc.)
  # in additional_dependencies. `make venv` / `make install-dev` keeps
  # the venv up to date.
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (via venv)
        entry: venv/bin/mypy --strict src/
        language: system
        files: ^src/
        pass_filenames: false

      - id: pytest-smoke
        name: pytest smoke (via venv)
        entry: venv/bin/pytest -q tests/test_smoke.py
        language: system
        types: [python]
        pass_filenames: false
